<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xsupply — Order Confirmed!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#6e6e6e; --bg2:#5d5c5c; --gold:#c9a84c; --gold-lt:#e8c97a; --white:#f0ece4; --muted:#c8c4bc; --neon:#d4f050; }
    body { background: var(--bg); color: var(--white); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 6rem); line-height: 0.9; letter-spacing: 0.04em; margin-bottom: 1rem; }
    .title span { color: var(--gold); }
    .sub { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; color: var(--muted); max-width: 420px; line-height: 1.7; margin-bottom: 2.5rem; }
    .sub strong { color: var(--white); }
    .btn { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--bg2); background: var(--gold); padding: 1rem 2.5rem; text-decoration: none; clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); transition: background 0.2s; display: inline-block; }
    .btn:hover { background: var(--gold-lt); }
    .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: fall linear forwards; }
    @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0; } }
  </style>
  <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2JP67WX64Y"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-2JP67WX64Y");
</script>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <div class="icon">🎉</div>
  <div class="title">ORDER<br><span>CONFIRMED!</span></div>
  <p class="sub">You're all set. <strong>Check your email</strong> for your receipt and tracking info. Your product is on its way.</p>
  <a href="index.html" class="btn">Back to Store</a>
  <script>
    localStorage.removeItem('scoopx_cart');
    const colors = ['#c9a84c','#e8c97a','#d4f050','#f0ece4','#ffffff'];
    const c = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
      c.appendChild(d);
    }
  </script>
</body>
</html>
